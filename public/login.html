<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - WebInject</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0d14;
      --surface: #111520;
      --surface2: #161b28;
      --border: rgba(255,255,255,.08);
      --border2: rgba(255,255,255,.13);
      --accent: #6366f1;
      --accent2: #818cf8;
      --error: #f43f5e;
      --text: #e2e8f0;
      --muted: #64748b;
      --muted2: #94a3b8;
      --glow: rgba(99,102,241,.35);
    }

    body {
      min-height: 100vh;
      font-family: Inter, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }

    .login-shell {
      width: min(100%, 390px);
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .7rem;
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -.02em;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg,#6366f1,#ec4899);
      box-shadow: 0 0 22px rgba(99,102,241,.45);
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem;
      box-shadow: 0 20px 70px rgba(0,0,0,.35);
    }

    .title {
      font-size: 1.25rem;
      font-weight: 750;
      margin-bottom: .35rem;
    }

    .subtitle {
      color: var(--muted2);
      font-size: .88rem;
      line-height: 1.5;
      margin-bottom: 1.15rem;
    }

    label {
      display: block;
      color: var(--muted2);
      font-size: .8rem;
      font-weight: 600;
      margin-bottom: .35rem;
    }

    .field {
      margin-bottom: .9rem;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 9px;
      color: var(--text);
      font: 500 .9rem Inter, sans-serif;
      padding: .72rem .85rem;
      outline: none;
      transition: border .2s, box-shadow .2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,.18);
    }

    .error {
      display: none;
      margin-bottom: .9rem;
      padding: .65rem .75rem;
      border-radius: 9px;
      background: rgba(244,63,94,.12);
      border: 1px solid rgba(244,63,94,.25);
      color: #fda4af;
      font-size: .82rem;
      line-height: 1.45;
    }

    .error.visible { display: block; }

    button {
      width: 100%;
      border: 0;
      border-radius: 9px;
      padding: .72rem 1rem;
      background: var(--accent);
      color: #fff;
      font: 700 .9rem Inter, sans-serif;
      cursor: pointer;
      transition: transform .2s, background .2s, box-shadow .2s;
    }

    button:hover {
      background: var(--accent2);
      box-shadow: 0 8px 28px var(--glow);
      transform: translateY(-1px);
    }

    .hint {
      color: var(--muted);
      text-align: center;
      font-size: .74rem;
      font-family: "JetBrains Mono", monospace;
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <div class="brand">
      <div class="brand-icon" aria-hidden="true">W</div>
      <span>WebInject</span>
    </div>

    <section class="login-card">
      <h1 class="title">Masuk</h1>
      <p class="subtitle">Gunakan akun yang dikonfigurasi di file environment server.</p>

      <div class="error" id="login-error">Username atau password salah.</div>

      <form method="POST" action="/login" autocomplete="on">
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required autofocus />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>

        <button type="submit">Login</button>
      </form>
    </section>

    <p class="hint">AUTH_USERNAME / AUTH_PASSWORD</p>
  </main>

  <script>
    if (new URLSearchParams(window.location.search).get('error')) {
      document.getElementById('login-error').classList.add('visible');
    }
  </script>
</body>
</html>
